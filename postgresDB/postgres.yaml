apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  serviceName: "postgres"
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_DB
          value: mydb
        - name: POSTGRES_PASSWORD
          value: "1234"
        - name: POSTGRES_USER
          value: "postgres"
        - name: TZ
          value: Asia/Kolkata
        - name: PGTZ
          value: Asia/Kolkata
        ports:
        - containerPort: 5432